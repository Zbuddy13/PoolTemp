name: Build APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.32.5'
          cache: true

      # The repo tracks only the Dart code; generate the Android project here.
      - name: Generate Android project
        run: flutter create . --platforms android --project-name pooltemp --org com.pooltemp

      # Two manifest fixes the release build needs to reach the ESP32:
      # - INTERNET permission (Flutter's template only grants it to debug builds)
      # - cleartext HTTP allowed (the ESP32 serves plain HTTP, blocked by default)
      - name: Allow network access to the ESP32
        run: |
          sed -i '0,/<application/s#<application#<uses-permission android:name="android.permission.INTERNET"/>\n    <application android:usesCleartextTraffic="true"#' android/app/src/main/AndroidManifest.xml
          grep -q 'usesCleartextTraffic' android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' android/app/src/main/AndroidManifest.xml

      # flutter create may overwrite tracked files and adds a template
      # counter-app test that doesn't apply to this project.
      - name: Restore repo files clobbered by flutter create
        run: |
          git checkout -- .
          rm -f test/widget_test.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      # The Flutter template signs release builds with the debug key, so this
      # APK is installable on a test device as-is (not Play Store ready).
      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pooltemp-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
